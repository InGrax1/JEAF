<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover: permite usar env(safe-area-inset-*) para respetar
         el notch/Dynamic Island y el home indicator cuando la app corre en
         modo standalone (agregada a la pantalla de inicio en iOS). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>JEAF — Panel Administrativo</title>

    <!-- Primer pintado ANTES de que cargue el CSS/JS: sin esto, el arranque de
         la PWA en iOS muestra un destello negro (no hay imagen de arranque y el
         fondo por defecto en standalone es negro). Debe coincidir con
         --color-background de index.css. -->
    <style>
      html {
        background-color: #f7f9fb;
      }
    </style>

    <!-- Favicon. ?v=2: los navegadores cachean el favicon de forma muy agresiva
         por origen (más que el resto de los assets); el query param fuerza a
         recargarlo cuando cambia el archivo (p. ej. al reemplazar la marca). -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=2" />

    <!-- PWA / iOS: "Agregar a inicio" abre en modo standalone (sin la barra de
         Safari), con el icono y el nombre de la app. iOS ignora manifest.json
         para esto, por lo que estos meta tags son obligatorios. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="JEAF" />
    <meta name="theme-color" content="#000000" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
